name: "P6M Token Exchange"
description: "Exchanges GitHub Actions OIDC token for a P6M YBOR installation token"
author: "P6M Platform <platform@ybor.ai>"

# Define the inputs for this action
inputs:
  platform_installation_id:
    description: The P6M platform installation ID
    required: false
  platform_token_exchange_url:
    description: The URL of the token exchange service
    required: false
    default: "https://auth.p6m.dev/api/github/actions/token-exchange"
  set_env:
    description: Whether to set GITHUB_TOKEN and GH_TOKEN in the environment
    required: false
    default: "true"
  skip_ci:
    description: Append skip-checks trailer to commit messages to prevent workflow loops
    required: false
    default: "true"
  show_summary:
    description: Whether to output token exchange results to GITHUB_STEP_SUMMARY
    required: false
    default: "true"

# Define the outputs for this action
outputs:
  github_token:
    description: The P6M YBOR installation token
    value: ${{ steps.p6m-ybor.outputs.token }}
  status:
    description: The status of the token exchange
    value: ${{ steps.p6m-ybor.outputs.status }}

# Define the runs configuration
runs:
  using: "composite"
  steps:
    - name: Get P6M YBOR Token
      id: p6m-ybor
      shell: bash
      env:
        PLATFORM_INSTALLATION_ID: ${{ inputs.platform_installation_id }}
        PLATFORM_TOKEN_EXCHANGE_URL: ${{ inputs.platform_token_exchange_url }}
        GITHUB_CONTEXT: ${{ toJSON(github) }}
      run: |
        set -euo pipefail
        if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
          echo "::warning::OIDC token request variables are not set. Ensure the workflow has 'permissions: id-token: write' configured."
          echo "## ⚠️ Token Exchange Warning" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "OIDC token request variables are not set. Ensure the workflow has:" >> $GITHUB_STEP_SUMMARY
          echo '```yaml' >> $GITHUB_STEP_SUMMARY
          echo "permissions:" >> $GITHUB_STEP_SUMMARY
          echo "  id-token: write" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
        ACTIONS_TOKEN=$(curl -s -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -er '.value')

        RESPONSE=$(curl -X POST \
            -H "Content-Type: application/vnd.p6m.github-context+json" \
            -H "x-github-token: ${{ github.token }}" \
            -H "x-actions-token: $ACTIONS_TOKEN" \
            -H "x-installation-id: $PLATFORM_INSTALLATION_ID" \
            -d "$GITHUB_CONTEXT" \
            $PLATFORM_TOKEN_EXCHANGE_URL)
        ERROR=$(echo "$RESPONSE" | jq -r '.error')
        if [ "$ERROR" != 'null' ]; then
          echo "Error: $ERROR"
          exit 1
        fi
        echo token=$(echo "$RESPONSE" | jq -er '.token') >> $GITHUB_OUTPUT
        STATUS=$(echo "$RESPONSE" | jq -er '.status')
        echo status=$STATUS >> $GITHUB_OUTPUT
        echo "Status: $STATUS"

    # Devnote: GH_TOKEN is used by the gh CLI, while GITHUB_TOKEN is used by GitHub Actions and other tools
    - name: Set GITHUB_TOKEN and GH_TOKEN
      if: inputs.set_env == 'true'
      shell: bash
      run: |
        echo "__GITHUB_TOKEN__=${{ github.token }}" >> $GITHUB_ENV
        echo "__GH_TOKEN__=${{ github.token }}" >> $GITHUB_ENV
        echo "GITHUB_TOKEN=${{ steps.p6m-ybor.outputs.token }}" >> $GITHUB_ENV
        echo "GH_TOKEN=${{ steps.p6m-ybor.outputs.token }}" >> $GITHUB_ENV

    - name: Configure Git for App Token
      if: inputs.set_env == 'true' && steps.p6m-ybor.outputs.status == 'exchanged'
      shell: bash
      run: |
        git config --global user.name "p6m-ybor[bot]"
        git config --global user.email "184961816+p6m-ybor[bot]@users.noreply.github.com"
        git config --local --unset-all http.https://github.com/.extraheader 2>/dev/null || true
        git config --local http.https://github.com/.extraheader "AUTHORIZATION: basic $(echo -n "x-access-token:${{ steps.p6m-ybor.outputs.token }}" | base64)"

    # Prevent workflow loops when pushing with an app token by appending a
    # skip-checks trailer to every commit message via a prepare-commit-msg hook.
    # https://docs.github.com/en/actions/how-tos/manage-workflow-runs/skip-workflow-runs
    - name: Install skip-checks commit hook
      if: inputs.skip_ci == 'true' && steps.p6m-ybor.outputs.status == 'exchanged'
      shell: bash
      run: |
        cat > .git/hooks/prepare-commit-msg << 'EOF'
        #!/bin/sh
        printf '\n\nskip-checks: true\n' >> "$1"
        EOF
        chmod +x .git/hooks/prepare-commit-msg

    - name: Show Summary
      if: inputs.show_summary == 'true'
      shell: bash {0}
      run: |
        redact() {
          local token="$1"
           if [ -n "$token" ] && [ ${#token} -gt 8 ]; then
            local prefix="${token:0:4}"
            local suffix="${token: -4}"
            echo "${prefix}...${suffix}"
          else
            echo "$token"
          fi
        }

        OLD_REDACTED=$(redact "$__GITHUB_TOKEN__")
        NEW_REDACTED=$(redact "$GITHUB_TOKEN")

        echo "## Token Exchange Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Status | \`${{ steps.p6m-ybor.outputs.status }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Original Token | \`$OLD_REDACTED\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Exchanged Token | \`$NEW_REDACTED\` |" >> $GITHUB_STEP_SUMMARY
        if [ "${{ inputs.set_env }}" == "true" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '> **Tip:** The original token is preserved in `__GITHUB_TOKEN__` / `__GH_TOKEN__` env vars and via `${{ '{{' }} github.token ${{ '}}' }}`.' >> $GITHUB_STEP_SUMMARY
        fi

        # Use the token to list repos accessible to the installation
        REPOS=$(gh api /installation/repositories --jq '.repositories[].full_name' 2>/dev/null) || true
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Accessible Repositories" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -n "$REPOS" ]; then
          echo "$REPOS" | while read -r repo; do
            echo "- \`$repo\`" >> $GITHUB_STEP_SUMMARY
          done
        else
          echo "_No repositories accessible or token invalid_" >> $GITHUB_STEP_SUMMARY
        fi

# Define the branding for the action in the GitHub Marketplace
branding:
  icon: "lock"
  color: "blue"
