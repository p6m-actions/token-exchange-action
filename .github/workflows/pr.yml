name: Test Token Exchange

on:
  pull_request:
  workflow_dispatch:
    inputs:
      hostname:
        description: Token exchange hostname
        required: false
        default: auth.p6m.dev

jobs:
  test:
    name: Test Token Exchange
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get P6M YBOR Token
        uses: ./
        with:
          platform_token_exchange_url: https://${{ inputs.hostname || 'auth.p6m.dev' }}/api/github/actions/token-exchange

  test-target-repositories-forwarding:
    name: Test target_repositories header forwarding
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start mock token-exchange endpoint
        run: |
          python3 - <<'PY' &
          import http.server, json
          class H(http.server.BaseHTTPRequestHandler):
              def do_POST(self):
                  with open('/tmp/captured-headers.txt', 'w') as f:
                      for k, v in self.headers.items():
                          f.write(f'{k.lower()}: {v}\n')
                  body = json.dumps({'token': 'fake-token-abcdef1234567890', 'status': 'exchanged', 'error': None}).encode()
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.send_header('Content-Length', str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)
              def log_message(self, *a, **k): pass
          http.server.HTTPServer(('127.0.0.1', 8765), H).serve_forever()
          PY
          for i in {1..20}; do nc -z 127.0.0.1 8765 && break; sleep 0.2; done

      - name: Run action with target_repositories
        uses: ./
        with:
          platform_token_exchange_url: http://127.0.0.1:8765/api/github/actions/token-exchange
          target_repositories: octocat/hello-world,foo/bar
          set_env: "false"
          show_summary: "false"
          skip_ci: "false"

      - name: Assert header was forwarded
        run: |
          test -f /tmp/captured-headers.txt
          grep -i '^x-target-repositories: octocat/hello-world,foo/bar$' /tmp/captured-headers.txt
