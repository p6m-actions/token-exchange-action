name: Test Token Exchange

on:
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Test Token Exchange
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get P6M YBOR Token
        id: token
        uses: ./
        with:
          platform_installation_id: ${{ vars.PLATFORM_INSTALLATION_ID }}
