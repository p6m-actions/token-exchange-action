name: Release Action

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Type of release to create"
        required: true
        default: "minor_release"
        type: choice
        options:
          - "minor_release"
          - "major_branch"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history and tags

      - name: Get P6M YBOR Token
        id: token
        uses: ./
        with:
          platform_installation_id: ${{ vars.PLATFORM_INSTALLATION_ID }}

      - name: Run GitHub Repository Release Action
        uses: p6m-actions/repository-release@v1
        with:
          release_type: ${{ github.event.inputs.release_type }}
          github_token: ${{ steps.token.outputs.github_token }}
